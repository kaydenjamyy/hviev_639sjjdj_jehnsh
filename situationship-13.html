<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#02040e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>situationship</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#02040e;font-family:'Inter',system-ui,sans-serif;color:#fff;-webkit-tap-highlight-color:transparent;}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;}
.messages{min-height:0;}

/* ===== LOCK SCREEN ONBOARDING ===== */
.lock-screen{flex:1;display:flex;flex-direction:column;padding:0;position:relative;overflow:hidden;}
.lock-blobs{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.lock-blob{position:absolute;border-radius:50%;filter:blur(38px);opacity:0.55;mix-blend-mode:screen;}
.lock-blob.b1{width:260px;height:260px;background:radial-gradient(circle,#7c5cbf,transparent 70%);top:-60px;left:-80px;animation:blobFloat1 22s ease-in-out infinite;}
.lock-blob.b2{width:220px;height:220px;background:radial-gradient(circle,#c9a84c,transparent 70%);top:30%;right:-90px;animation:blobFloat2 26s ease-in-out infinite;}
.lock-blob.b3{width:280px;height:280px;background:radial-gradient(circle,#4a7fa5,transparent 70%);bottom:-100px;left:10%;animation:blobFloat3 30s ease-in-out infinite;}
.lock-blob.b4{width:180px;height:180px;background:radial-gradient(circle,#c0392b,transparent 70%);bottom:10%;right:-50px;animation:blobFloat1 24s ease-in-out infinite reverse;}
.lock-blob.b5{width:160px;height:160px;background:radial-gradient(circle,#2e8b57,transparent 70%);top:55%;left:-60px;animation:blobFloat2 28s ease-in-out infinite reverse;}
@keyframes blobFloat1{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,30px) scale(1.15);}66%{transform:translate(-20px,50px) scale(0.9);}}
@keyframes blobFloat2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-50px,-40px) scale(1.2);}}
@keyframes blobFloat3{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(30px,-30px) scale(0.95);}75%{transform:translate(-40px,20px) scale(1.1);}}
.lock-twinkle{position:absolute;border-radius:50%;background:rgba(255,255,255,0.9);box-shadow:0 0 6px rgba(255,255,255,0.8);animation:twinkle 3.5s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.9;}}
.lock-time-wrap,.lock-card{position:relative;z-index:1;}
.lock-time-wrap{text-align:center;padding:32px 20px 10px;flex-shrink:0;transition:padding 0.25s;}
.lock-time-wrap.compact{padding:18px 20px 6px;}
.lock-time{font-family:'Inter',sans-serif;font-weight:200;font-size:44px;letter-spacing:-2px;color:rgba(255,255,255,0.95);line-height:1;transition:font-size 0.25s;}
.lock-time-wrap.compact .lock-time{font-size:30px;}
.lock-date{font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px;letter-spacing:0.5px;}
.lock-divider{width:36px;height:1px;background:rgba(201,168,76,0.4);margin:10px auto;}
.lock-card{flex:1;display:flex;flex-direction:column;padding:0 22px 20px;overflow-y:auto;min-height:0;}
.lock-card::-webkit-scrollbar{width:0;}
.lock-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:24px;text-align:center;color:rgba(255,255,255,0.95);margin-bottom:4px;}
.lock-sub{font-size:11px;text-align:center;color:rgba(255,255,255,0.4);margin-bottom:14px;line-height:1.5;padding:0 6px;}
.lock-option{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(16px);border-radius:16px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.lock-option:active{transform:scale(0.97);background:rgba(201,168,76,0.08);}
.lock-option.chosen{border-color:rgba(201,168,76,0.55);background:rgba(201,168,76,0.1);cursor:default;}
.lock-option.chosen:active{transform:none;}
.lock-option.chosen .lock-option-letter{color:#e6c873;}
.lock-option.dimmed{opacity:0.4;padding:10px 16px;}
.lock-option.dimmed .lock-option-title{font-size:12px;}
.lock-option-letter{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:#c9a84c;margin-bottom:4px;}
.lock-option-title{font-size:14px;font-weight:700;color:#eee;margin-bottom:3px;}
.lock-option-sub{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.4;}
.lock-warning{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:8px;padding:9px;background:rgba(180,40,40,0.08);border:1px solid rgba(180,40,40,0.2);border-radius:10px;flex-shrink:0;}
.lock-warning-text{font-size:10px;color:rgba(255,160,160,0.85);font-weight:600;letter-spacing:0.3px;}
.lock-char-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;flex-shrink:0;}
.lock-char-chip{flex:1 1 calc(50% - 7px);min-width:calc(50% - 7px);background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:9px 8px;text-align:center;cursor:pointer;transition:all 0.15s;}
.lock-char-chip.selected{border-color:#c9a84c;background:rgba(201,168,76,0.12);}
.lock-char-chip-emoji{font-size:18px;margin-bottom:3px;}
.lock-char-chip-name{font-size:10.5px;font-weight:700;color:#eee;}
.lock-char-chip-blurb{font-size:9px;color:rgba(255,255,255,0.4);margin-top:2px;line-height:1.3;}
.lock-confirm-btn{margin-top:12px;width:100%;background:linear-gradient(135deg,#c9a84c,#8a6020);border:none;border-radius:14px;padding:13px;color:#0a0a12;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;opacity:0.4;pointer-events:none;transition:opacity 0.2s;flex-shrink:0;}
.lock-confirm-btn.active{opacity:1;pointer-events:auto;}
.lock-back-link{text-align:center;margin-top:10px;font-size:11px;color:rgba(255,255,255,0.25);cursor:pointer;flex-shrink:0;padding-bottom:6px;}

/* irrevocable confirm modal */
.confirm-overlay{position:fixed;inset:0;background:rgba(2,4,14,0.88);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
.confirm-box{background:rgba(20,20,35,0.95);border:1px solid rgba(201,168,76,0.25);border-radius:18px;padding:26px 22px;max-width:340px;text-align:center;}
.confirm-icon{font-size:32px;margin-bottom:10px;}
.confirm-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:#eee;margin-bottom:8px;}
.confirm-sub{font-size:12px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:18px;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btn-cancel{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;color:#aaa;font-size:13px;cursor:pointer;font-family:inherit;}
.confirm-btn-go{flex:1;background:linear-gradient(135deg,#c9a84c,#8a6020);border:none;border-radius:12px;padding:12px;color:#0a0a12;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;}

/* ===== HEADER ===== */
.header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(4,6,20,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.back-btn{background:none;border:none;color:#888;font-size:24px;cursor:pointer;padding:0 6px;line-height:1;}
.char-avatar-init{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.15);}
.header-info{flex:1;min-width:0;}
.header-name{font-size:15px;font-weight:700;}
.header-status{font-size:11px;color:#4a5a8a;}
.header-taps{font-size:11px;background:rgba(0,0,0,0.4);padding:4px 9px;border-radius:10px;color:rgba(255,255,255,0.5);flex-shrink:0;}
.header-taps.low{color:#ff8a8a;background:rgba(180,40,40,0.15);}

/* ===== SCENE BANNER ===== */
.scene-banner{padding:7px 14px;background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;display:flex;gap:6px;align-items:flex-start;}
.scene-banner-dot{color:#c9a84c;flex-shrink:0;margin-top:1px;}
.scene-banner-text{font-size:11px;color:rgba(200,210,240,0.7);font-style:italic;line-height:1.5;}

/* ===== MESSAGES ===== */
.messages{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch;}
.messages::-webkit-scrollbar{width:0;}
.msg-row{display:flex;width:100%;}
.msg-row.right{justify-content:flex-end;}
.msg-row.left{justify-content:flex-start;}
.bubble{max-width:74%;padding:10px 14px;font-size:14px;line-height:1.5;word-break:break-word;}
.bubble.them{background:rgba(18,26,65,0.85);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.12);border-radius:18px 18px 18px 4px;color:#dde;}
.bubble.player{background:linear-gradient(135deg,rgba(255,107,157,0.5),rgba(219,68,128,0.5),rgba(255,140,180,0.5));background-size:200% 200%;border-radius:18px 18px 4px 18px;color:#fff;box-shadow:inset 0 1px 1px rgba(255,255,255,0.25),inset 0 -1px 6px rgba(150,20,70,0.15),0 2px 10px rgba(255,107,157,0.22);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.18);animation:fluidPinkShift 5s ease-in-out infinite;}
@keyframes fluidPinkShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.bubble.action{background:none;border:none;backdrop-filter:none;font-style:italic;color:rgba(255,255,255,0.38);font-size:12px;padding:2px 8px;border-radius:0;}
.msg-time{font-size:10px;margin-top:4px;text-align:right;color:rgba(255,255,255,0.3);}
.bubble.player .msg-time{color:rgba(255,255,255,0.5);}
.typing-bubble{display:flex;gap:4px;align-items:center;padding:14px 16px;}
.typing-bubble span{width:7px;height:7px;border-radius:50%;background:#2a3a6a;display:inline-block;animation:pulse 1.2s infinite ease-in-out;}
.typing-bubble span:nth-child(2){animation-delay:.2s;}
.typing-bubble span:nth-child(3){animation-delay:.4s;}

/* ===== CHOICES ===== */
.choices{padding:12px 14px 22px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;background:rgba(4,6,20,0.7);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.06);position:relative;z-index:5;overflow:visible;}
.choices-label{font-size:9.5px;letter-spacing:1.2px;color:rgba(201,168,76,0.55);text-transform:uppercase;font-weight:700;margin-bottom:1px;padding-left:4px;}
.choice-btn{display:flex;align-items:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.22);border-radius:999px;padding:13px 20px;color:#eef1ff;font-size:14px;cursor:pointer;text-align:left;font-family:inherit;transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);width:100%;box-shadow:inset 0 1px 1px rgba(255,255,255,0.25),inset 0 -1px 6px rgba(0,0,0,0.18),0 4px 14px rgba(0,0,0,0.25);}
.choice-btn-text{flex:1;}
.choice-btn.filler{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:rgba(224,232,255,0.5);font-size:12.5px;padding:10px 18px;font-style:italic;box-shadow:none;}
.choice-btn:active{background:rgba(201,168,76,0.25);border-color:rgba(201,168,76,0.55);transform:scale(0.97);}

/* ===== HOME (CARD GRID) ===== */
.home{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.home-header{padding:24px 20px 14px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:28px;line-height:1;}
.logo .sit{font-family:'Cormorant Garamond',serif;font-weight:300;}
.logo .ship{font-family:'Syne',sans-serif;font-weight:800;color:#c9a84c;font-style:italic;letter-spacing:-1px;}
.home-tier-badge{font-size:10px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);color:#c9a84c;padding:5px 10px;border-radius:10px;font-weight:700;letter-spacing:0.3px;cursor:pointer;}
.home-taps-bar{margin:0 20px 14px;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.home-reset-row{padding:0 20px 10px;flex-shrink:0;}
.home-reset-link{font-size:10px;color:rgba(255,255,255,0.22);cursor:pointer;text-align:right;}
.home-taps-label{font-size:11px;color:rgba(255,255,255,0.5);}
.home-taps-num{font-size:13px;font-weight:700;color:#c9a84c;}
.card-grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 16px 30px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.card-grid.bounce-end{animation:scrollBounceEnd 0.45s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes scrollBounceEnd{0%{transform:translateY(0);}40%{transform:translateY(-10px);}100%{transform:translateY(0);}}
.card-grid::-webkit-scrollbar{width:0;}
.char-card{position:relative;border-radius:26px;overflow:hidden;aspect-ratio:1.05;cursor:pointer;border:1px solid rgba(255,255,255,0.22);transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:14px;backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);background:linear-gradient(160deg,rgba(255,107,157,0.22),rgba(120,40,90,0.28));box-shadow:inset 0 1px 1px rgba(255,255,255,0.3),inset 0 -1px 8px rgba(0,0,0,0.25),0 8px 24px rgba(0,0,0,0.35);text-align:center;}
.char-card:active{transform:scale(0.96);}
.char-card:active{transform:scale(0.96);}
.char-card-emoji-wrap{position:absolute;top:12px;left:12px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.1);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.18);animation:cardBlobMorph 7s ease-in-out infinite, cardBlobDrift 9s ease-in-out infinite;}
.char-card-emoji{font-size:21px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));}
@keyframes cardBlobMorph{0%,100%{border-radius:60% 40% 55% 45%/50% 60% 40% 50%;}25%{border-radius:45% 55% 40% 60%/60% 40% 60% 40%;}50%{border-radius:55% 45% 60% 40%/40% 55% 45% 60%;}75%{border-radius:40% 60% 45% 55%/55% 45% 55% 45%;}}
@keyframes cardBlobDrift{0%,100%{transform:translate(0,0);}50%{transform:translate(3px,-2px);}}
.char-card-lock{position:absolute;top:14px;right:14px;font-size:13px;background:rgba(0,0,0,0.5);padding:4px 8px;border-radius:8px;color:rgba(255,255,255,0.6);}
.char-card-online{position:absolute;top:16px;right:14px;width:9px;height:9px;border-radius:50%;background:#22c55e;border:2px solid rgba(0,0,0,0.4);box-shadow:0 0 8px #22c55e;}
.char-card-name{font-size:17px;font-weight:800;position:relative;z-index:2;color:#ffffff;text-shadow:0 0 10px rgba(0,0,0,0.9),0 2px 4px rgba(0,0,0,0.95),0 0 20px rgba(255,220,160,0.4);letter-spacing:0.2px;}
.char-card-role{font-size:9px;color:rgba(255,255,255,0.75);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;position:relative;z-index:2;text-shadow:0 1px 4px rgba(0,0,0,0.6);}
.char-card-tag{font-size:10px;color:rgba(255,255,255,0.55);margin-top:4px;position:relative;z-index:2;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,0.6);}
.char-card-shade{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,0.25) 50%,rgba(0,0,0,0.85) 100%);}
.char-card.locked{filter:grayscale(0.6) brightness(0.55);}

/* ===== SCENE PICKER ===== */
.scene-picker{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.scene-picker-list{flex:1;overflow-y:auto;padding:14px 16px 30px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:12px;}
.scene-picker-list::-webkit-scrollbar{width:0;}
.scene-card{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden;border-radius:999px;border:1px solid rgba(255,255,255,0.22);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);background:rgba(255,255,255,0.06);box-shadow:inset 0 1px 1px rgba(255,255,255,0.25),inset 0 -1px 6px rgba(0,0,0,0.2),0 6px 18px rgba(0,0,0,0.3);}
.scene-card.shimmer-in::before{content:'';position:absolute;inset:0;background:linear-gradient(100deg,transparent 30%,var(--shimmer-color,rgba(120,180,255,0.35)) 50%,transparent 70%);background-size:250% 100%;background-position:150% 0;animation:shimmerSweep 1.8s ease forwards;pointer-events:none;border-radius:999px;}
@keyframes shimmerSweep{0%{background-position:150% 0;opacity:1;}100%{background-position:-50% 0;opacity:0;}}
.scene-card:active{transform:scale(0.97);}
.scene-card-letter{width:38px;height:38px;border-radius:50%;background:rgba(201,168,76,0.16);border:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:17px;color:#c9a84c;flex-shrink:0;}
.scene-card-info{flex:1;min-width:0;}
.scene-card-title{font-size:14px;font-weight:600;color:#eeeeff;margin-bottom:3px;}
.scene-card-sub{font-size:12px;color:rgba(255,255,255,0.4);}
.scene-card-arrow{color:rgba(255,255,255,0.2);font-size:18px;flex-shrink:0;}
.scene-card-meta{font-size:10px;color:rgba(201,168,76,0.6);margin-top:4px;}

/* ===== ROCKET TRAIL ===== */
.rocket-trail-bar{position:relative;height:40px;flex-shrink:0;overflow:hidden;border-top:1px solid rgba(255,255,255,0.05);background:rgba(2,4,14,0.45);}
.rocket-unit{position:absolute;top:50%;display:flex;align-items:center;gap:8px;white-space:nowrap;animation:rocketFly 18s linear forwards;}
.rocket-unit .rocket-emoji{font-size:15px;transform:scaleX(-1);filter:drop-shadow(0 0 6px rgba(255,200,150,0.6));flex-shrink:0;}
.rocket-unit .rocket-quote{font-size:11px;font-style:italic;color:rgba(255,255,255,0.4);}
@keyframes rocketFly{from{right:-85%;transform:translateY(-50%);}to{right:115%;transform:translateY(-50%);}}

/* ===== WALL ===== */
.wall-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px;text-align:center;gap:12px;overflow-y:auto;}
.wall-emoji{font-size:44px;}
.wall-title{font-family:'Cormorant Garamond',serif;font-size:23px;color:rgba(255,255,255,0.9);line-height:1.3;}
.wall-sub{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.6;margin-bottom:6px;}
.tier-card{width:100%;border-radius:16px;padding:16px 18px;text-align:left;cursor:pointer;font-family:inherit;border:1px solid;margin-bottom:4px;}
.tier-name{font-size:14px;font-weight:800;margin-bottom:3px;}
.tier-detail{font-size:11px;opacity:0.7;line-height:1.4;}
.tier-price{font-size:18px;font-weight:800;float:right;}
.tier-699{background:linear-gradient(135deg,rgba(40,20,90,0.9),rgba(20,10,55,0.9));border-color:rgba(180,100,255,0.3);color:#c9a0ff;}
.tier-999{background:linear-gradient(135deg,rgba(70,45,10,0.9),rgba(40,25,5,0.9));border-color:rgba(201,168,76,0.3);color:#c9a84c;}
.tier-1499{background:linear-gradient(135deg,rgba(90,10,30,0.9),rgba(50,5,15,0.9));border-color:rgba(255,90,130,0.35);color:#ff9ab3;}
.wall-code-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;width:100%;font-family:inherit;margin-top:6px;}
.code-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:13px 16px;color:#fff;font-size:13px;outline:none;letter-spacing:1px;font-family:monospace;margin-bottom:8px;}

<script>
// ── GALAXY BACKGROUND ──────────────────────────────────────────────────────
(function(){
const c=document.getElementById('gc'),ctx=c.getContext('2d');
let angle=0;
const resize=()=>{c.width=innerWidth;c.height=innerHeight;};
resize();addEventListener('resize',resize);
const stars=Array.from({length:160},()=>({x:Math.random()*3000,y:Math.random()*3000,r:Math.random()*1.2+.2,a:Math.random()*.6+.2,ts:Math.random()*.01+.004,to:Math.random()*Math.PI*2}));
const sparks=Array.from({length:50},()=>mk(true));
function mk(r){return{x:Math.random()*c.width,y:r?Math.random()*c.height:-10,vy:Math.random()*.55+.2,vx:(Math.random()-.5)*.3,a:Math.random()*.45+.1,sz:Math.random()*1.2+.3,fade:Math.random()*.003+.001};}
let shoots=[],lastS=0,t=0;
let meteors=[],lastM=0;
function mks(){return{x:Math.random()*c.width*.85,y:Math.random()*c.height*.4,len:90+Math.random()*110,angle:Math.PI/5+Math.random()*.4,speed:6+Math.random()*7,life:0,maxLife:48};}
function mkMeteor(){return{x:Math.random()*c.width,y:-30,len:140+Math.random()*100,angle:Math.PI/3.4+Math.random()*.3,speed:3.5+Math.random()*2.5,life:0,maxLife:90,girth:2.2+Math.random()*1.3,tint:Math.random()<0.5?[255,210,160]:[210,225,255]};}
(function draw(){
t++;angle+=.0006;
const W=c.width,H=c.height;
ctx.clearRect(0,0,W,H);ctx.fillStyle='#02040e';ctx.fillRect(0,0,W,H);

// ── slowly rotating spiral nebula/galaxy art ──────────────────────────────
ctx.save();
ctx.translate(W*0.5, H*0.38);
ctx.rotate(angle);
const galaxyR = Math.max(W,H)*0.62;
// soft core glow
const core = ctx.createRadialGradient(0,0,0,0,0,galaxyR*0.55);
core.addColorStop(0,'rgba(255,238,200,0.55)');
core.addColorStop(0.25,'rgba(255,200,170,0.30)');
core.addColorStop(0.55,'rgba(220,140,190,0.16)');
core.addColorStop(1,'rgba(20,20,60,0)');
ctx.beginPath();ctx.arc(0,0,galaxyR*0.55,0,Math.PI*2);ctx.fillStyle=core;ctx.fill();
// spiral arms as soft tapered arcs in alternating hues
const armColors = ['rgba(120,180,255,0.10)','rgba(180,120,230,0.09)','rgba(255,150,190,0.08)','rgba(110,220,200,0.07)'];
for(let arm=0; arm<4; arm++){
  ctx.save();
  ctx.rotate((Math.PI/2)*arm + Math.sin(t*0.0007+arm)*0.05);
  ctx.beginPath();
  for(let i=0;i<=60;i++){
    const tt = i/60;
    const r = galaxyR*0.08 + tt*galaxyR*0.95;
    const th = tt*Math.PI*2.1;
    const x = Math.cos(th)*r;
    const y = Math.sin(th)*r*0.42;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.lineWidth = galaxyR*0.16;
  ctx.strokeStyle = armColors[arm];
  ctx.lineCap='round';
  ctx.filter = 'blur(2px)';
  ctx.stroke();
  ctx.filter = 'none';
  ctx.restore();
}
ctx.restore();

const vg=ctx.createRadialGradient(W*.5,H*.5,W*.15,W*.5,H*.5,W*.85);
vg.addColorStop(0,'rgba(2,4,14,.08)');vg.addColorStop(.5,'rgba(2,4,14,.32)');vg.addColorStop(1,'rgba(2,4,14,.8)');

stars.forEach(s=>{const a=s.a*(.5+.5*Math.sin(t*s.ts+s.to));ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(215,228,255,${a})`;ctx.fill();});

if(t-lastS>140+Math.random()*120){shoots.push(mks());lastS=t;}
shoots=shoots.filter(s=>s.life<s.maxLife);
shoots.forEach(ss=>{ss.life++;const pr=ss.life/ss.maxLife,al=pr<.3?pr/.3:1-(pr-.3)/.7;const ex=ss.x+Math.cos(ss.angle)*ss.speed*ss.life,ey=ss.y+Math.sin(ss.angle)*ss.speed*ss.life;const gr=ctx.createLinearGradient(ex-Math.cos(ss.angle)*ss.len,ey-Math.sin(ss.angle)*ss.len,ex,ey);gr.addColorStop(0,'transparent');gr.addColorStop(1,`rgba(225,242,255,${al*.9})`);ctx.beginPath();ctx.moveTo(ex-Math.cos(ss.angle)*ss.len,ey-Math.sin(ss.angle)*ss.len);ctx.lineTo(ex,ey);ctx.strokeStyle=gr;ctx.lineWidth=1.5;ctx.stroke();ctx.beginPath();ctx.arc(ex,ey,2,0,Math.PI*2);ctx.fillStyle=`rgba(245,250,255,${al})`;ctx.fill();});
// occasional bigger, slower, brighter meteor with a warm/cool glowing trail and burn tint

meteors=meteors.filter(m=>m.life<m.maxLife);
meteors.forEach(mt=>{
  mt.life++;
  const pr=mt.life/mt.maxLife, al=pr<.15?pr/.15:1-(pr-.15)/.85;
  const ex=mt.x+Math.cos(mt.angle)*mt.speed*mt.life, ey=mt.y+Math.sin(mt.angle)*mt.speed*mt.life;
  const tx=mt.x-Math.cos(mt.angle)*mt.len*0+ex-Math.cos(mt.angle)*mt.len, ty=ey-Math.sin(mt.angle)*mt.len;
  const [r,g,b]=mt.tint;

  ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(ex,ey);ctx.strokeStyle=gr;ctx.lineWidth=mt.girth;ctx.lineCap='round';ctx.stroke();
  // glowing head
  ctx.beginPath();ctx.arc(ex,ey,mt.girth+1.5,0,Math.PI*2);
  const headGr=ctx.createRadialGradient(ex,ey,0,ex,ey,mt.girth+6);
  headGr.addColorStop(0,`rgba(255,255,255,${al})`);
  headGr.addColorStop(1,'transparent');
  ctx.fillStyle=headGr;ctx.fill();
});
requestAnimationFrame(draw);
})();

// ── CHARACTER VOICE BANKS (for procedural filler generation) ───────────────
// Each character has small-talk / banter / callback lines used to pad scenes
// to 150+ messages around the hand-written key beats, in-voice.
// ── PLAYER MESSAGE EMOJI SYSTEM ──────────────────────────────────────────────
// A subset of player choices get a contextual emoji appended when sent, based
// on simple sentiment cues in the label text, so the player's own voice reads
// a little warmer/human rather than flatly typed. Not every message gets one —
// roughly a quarter, weighted toward emotionally loaded lines.
const EMOJI_RULES = [
  { test: /sorry|apolog/i, options: ['🥺','😔'] },
  { test: /forgot|forgot—|forget/i, options: ['😭','🥲'] },
  { test: /silence|\*silence\*/i, options: [] }, // never decorate pure silence
  { test: /love|miss you|matter to me|mean(t)? something/i, options: ['🥹','💛'] },
  { test: /dramatic|theatrical|relentless/i, options: ['😏'] },
  { test: /fair|deal|noted|okay$/i, options: ['🙂'] },
  { test: /angry|upset|mad|furious/i, options: ['😬'] },
  { test: /promise|i will|i won't|i'll/i, options: ['🤍'] },
  { test: /\?$/, options: ['🤔'] },
];
function maybeDecorateChoice(label){
  if(/\*.*\*/.test(label)) return label; // never decorate stage-direction style choices like *silence*
  // skip decoration if the label already contains an emoji (avoid stacking, e.g. "I forgot 😭")
  if(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u.test(label)) return label;
  for(const rule of EMOJI_RULES){
    if(rule.test.test(label) && rule.options.length){
      if(Math.random() < 0.55){
        return label + ' ' + rand(rule.options);
      }
      return label;
    }
  }
  // small baseline chance for any other line to get a soft emoji
  if(Math.random() < 0.12){
    return label + ' ' + rand(['🙂','😊','💭']);
  }
  return label;
}

function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}
function pickN(arr,n){
  const pool=[...arr]; const out=[];
  for(let i=0;i<n && pool.length;i++){
    const idx=Math.floor(Math.random()*pool.length);
    out.push(pool[idx]); pool.splice(idx,1);
  }
  return out;
}

// ── SCENE EXPANSION ENGINE ──────────────────────────────────────────────────
// Takes a hand-written "beats" array (the real story) and pads it with
// in-voice filler exchanges so each scene reaches 150+ total messages,
// while preserving every beat's content and order untouched.
function expandScene(charId, beats, targetMin){
  targetMin = targetMin || 150;
  const voice = VOICE[charId];
  const out = [];
  let count = 0;

  beats.forEach((beat,bi) => {
    // Never insert filler immediately before a real choices beat — that's the
    // moment the player needs to see clearly, not bury it behind throwaway taps.
    const nextIsRealChoice = !!beat.choices;
    if(bi>0 && !nextIsRealChoice && Math.random()<0.85){
      const fillerLen = 2+Math.floor(Math.random()*3); // 2-4 filler msgs
      for(let f=0;f<fillerLen;f++){
        if(f%2===0){
          out.push({who:'them',msgs:[rand(voice.fillerThem)],filler:true});
        } else {
          out.push({autoChoice:true,label:rand(voice.fillerPlayer),filler:true});
        }
        count++;
      }
    }
    out.push(beat);
    count += (beat.msgs?beat.msgs.length:0) + (beat.choices?1:0);
  });

  // If still under target, append trailing filler — but never directly before
  // a beat that is a real choices block or an ending, so it never masks the
  // actual story moments.
  let guard=0;
  while(count < targetMin && guard<200){
    const fillerLen = 2+Math.floor(Math.random()*3);
    const block=[];
    for(let f=0;f<fillerLen;f++){
      if(f%2===0) block.push({who:'them',msgs:[rand(voice.fillerThem)],filler:true});
      else block.push({autoChoice:true,label:rand(voice.fillerPlayer),filler:true});
    }
    // find a safe insertion point: right after a 'them' dialogue node that is
    // itself not immediately followed by a real choices block
    let insertAt = -1;
    for(let attempt=0; attempt<30; attempt++){
      const candidate = 1 + Math.floor(Math.random()*Math.max(1,out.length-2));
      const before = out[candidate-1];
      const after = out[candidate];
      const beforeIsFillerOrDialogue = before && (before.filler || (before.who && !before.ending));
      const afterIsRealChoiceOrEnding = after && ((after.choices && !after.filler) || after.ending);
      if(beforeIsFillerOrDialogue && !afterIsRealChoiceOrEnding){
        insertAt = candidate; break;
      }
    }
    if(insertAt<0) insertAt = Math.max(1, out.length-3);
    out.splice(insertAt,0,...block);
    count += fillerLen;
    guard++;
  }

  return out;
}

// Convert the expanded array (with autoChoice markers) into the engine's flow format:
// {who,msgs} steps and {choices:[...]} steps, with autoChoice becoming a single-button choice.
function compileFlow(expanded){
  const flow=[];
  let idCounter=0;
  function nid(){ idCounter++; return 'n'+idCounter; }

  for(let i=0;i<expanded.length;i++){
    const step = expanded[i];
    if(step.autoChoice){
      const id = nid();
      flow.push({id, choices:[{label:step.label, next:'__NEXT__'}]});
    } else if(step.who && step.msgs){
      const id = nid();
      const node = {id, who:step.who, msgs:step.msgs};
      if(step.ending) node.ending = true;
      flow.push(node);
    } else if(step.choices){
      const id = nid();
      flow.push({id, choices:step.choices});
    }
  }

  // Wire up next pointers: autoChoice nodes point to the very next node's id;
  // hand-written choices already specify their own 'next' ids matching beat ids we set below.
  for(let i=0;i<flow.length;i++){
    const node=flow[i];
    if(node.choices){
      node.choices.forEach(ch=>{
        if(ch.next==='__NEXT__'){
          ch.next = flow[i+1] ? flow[i+1].id : null;
        }
      });
    }
  }
  return flow;
}

// Hand-written beats reference each other by symbolic ids (a2, a3, etc) for branches.
// We need beats with explicit ids preserved through expansion. We tag beat objects
// with their original id before expansion so compileFlow can use it instead of generating one,
// and rewrite 'next' targets that match original beat ids to the compiled id of that beat.
function buildScene(charId, rawBeats, targetMin){
  // tag pass-through: rawBeats elements may already carry id fields (from authored content)
  const expanded = expandScene(charId, rawBeats, targetMin);
  const flow=[];
  let counter=0;
  const idMap={}; // original authored id -> compiled id

  function nid(){counter++; return 'g'+counter;}

  expanded.forEach(step=>{
    const cid = nid();
    if(step.id) idMap[step.id]=cid;
    if(step.autoChoice){
      flow.push({_cid:cid, choices:[{label:step.label, next:'__NEXT__', filler:true}], filler:true});
    } else if(step.who && step.msgs){
      const node={_cid:cid, who:step.who, msgs:step.msgs};
      if(step.ending) node.ending=true;
      if(step.filler) node.filler=true;
      flow.push(node);
    } else if(step.choices){
      flow.push({_cid:cid, choices:step.choices.map(c=>({label:c.label, next:c.next}))});
    }
  });

  // resolve next pointers
  for(let i=0;i<flow.length;i++){
    const node=flow[i];
    if(node.choices){
      node.choices.forEach(ch=>{
        if(ch.next==='__NEXT__'){
          ch.next = flow[i+1] ? flow[i+1]._cid : null;
        } else if(idMap[ch.next]){
          ch.next = idMap[ch.next];
        } else {
          // dangling authored reference (e.g. 'ending') not found as a tagged id yet (forward ref) -
          // try resolving after full pass below
          ch.__pending = ch.next;
        }
      });
    }
  }
  // second pass for forward references
  for(let i=0;i<flow.length;i++){
    const node=flow[i];
    if(node.choices){
      node.choices.forEach(ch=>{
        if(ch.__pending){
          if(idMap[ch.__pending]) ch.next = idMap[ch.__pending];
          delete ch.__pending;
        }
      });
    }
  }

  // finalize: rename _cid -> id
  flow.forEach(n=>{ n.id = n._cid; delete n._cid; });
  return flow;
}

}

}

  else if(S.screen==='home') renderHome();
  else if(S.screen==='scenes') renderScenes();
  else if(S.screen==='chat') renderChat();
  else if(S.screen==='wall') renderWall();
  else if(S.screen==='ending') renderEnding();
}

// ── LOCK SCREEN ONBOARDING ──────────────────────────────────────────────────
function renderLock(){
  const wrap = div('lock-screen');

  // Fluid blob nebula background, layered behind the content
  const blobs = div('lock-blobs');
  ['b1','b2','b3','b4','b5'].forEach(cls=>{
    blobs.appendChild(div('lock-blob '+cls));
  });
  // scatter a handful of twinkling stars at randomized positions/delays
  for(let i=0;i<14;i++){
    const star = div('lock-twinkle');
    const size = 1.5 + Math.random()*2.5;
    star.style.width = size+'px';
    star.style.height = size+'px';
    star.style.left = (Math.random()*94+2)+'%';
    star.style.top = (Math.random()*92+2)+'%';
    star.style.animationDelay = (Math.random()*3.5)+'s';
    star.style.animationDuration = (2.5+Math.random()*3)+'s';
    blobs.appendChild(star);
  }
  wrap.appendChild(blobs);

  const timeWrap = div('lock-time-wrap'+(S.lockChoice?' compact':''));
  const now = new Date();
  const h = now.getHours()%12||12, m=String(now.getMinutes()).padStart(2,'0');
  timeWrap.appendChild(mkEl('div','lock-time',h+':'+m));
  if(!S.lockChoice){
    timeWrap.appendChild(mkEl('div','lock-date',now.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})));
  }
  wrap.appendChild(timeWrap);
  wrap.appendChild(div('lock-divider'));

  const card = div('lock-card');
  card.appendChild(mkEl('div','lock-title','choose your story'));
  card.appendChild(mkEl('div','lock-sub','Your first taps are free. How you spend them is permanent — choose wisely, you can\'t choose again.'));

  // Option A
  const optA = div('lock-option'+(S.lockChoice==='A'?' chosen':S.lockChoice==='B'?' dimmed':''));
  optA.appendChild(mkEl('div','lock-option-letter', S.lockChoice==='A' ? '✓ Option A — selected' : 'Option A'));
  optA.appendChild(mkEl('div','lock-option-title','50 free taps each, two characters'));
  if(S.lockChoice!=='A'){
    optA.appendChild(mkEl('div','lock-option-sub','Split your free trial across two storylines. Less depth in each, but you get to compare.'));
  }
  optA.addEventListener('click',()=>{
    if(S.lockChoice==='A') return;
    S.lockChoice='A';
    S.lockSelectedChars=[];
    render();
  });
  card.appendChild(optA);

  // Option B
  const optB = div('lock-option'+(S.lockChoice==='B'?' chosen':S.lockChoice==='A'?' dimmed':''));
  optB.appendChild(mkEl('div','lock-option-letter', S.lockChoice==='B' ? '✓ Option B — selected' : 'Option B'));
  optB.appendChild(mkEl('div','lock-option-title','100 free taps, one character'));
  if(S.lockChoice!=='B'){
    optB.appendChild(mkEl('div','lock-option-sub','All your free trial on a single storyline. More depth, fewer options.'));
  }
  optB.addEventListener('click',()=>{
    if(S.lockChoice==='B') return;
    S.lockChoice='B';
    S.lockSelectedChars=[];
    render();
  });
  card.appendChild(optB);

  if(S.lockChoice){
    const needCount = S.lockChoice==='A' ? 2 : 1;
    const pickLabel = div('lock-sub');
    pickLabel.style.marginTop='2px';
    pickLabel.style.marginBottom='4px';
    pickLabel.textContent = S.lockChoice==='A'
      ? `Pick two characters (${S.lockSelectedChars.length}/2):`
      : 'Pick one character:';
    card.appendChild(pickLabel);

    const grid = div('lock-char-grid');
    CHARACTERS.forEach(ch=>{
      const chip = div('lock-char-chip'+(S.lockSelectedChars.includes(ch.id)?' selected':''));
      chip.appendChild(mkEl('div','lock-char-chip-emoji',ch.emoji));
      chip.appendChild(mkEl('div','lock-char-chip-name',ch.name.split(' ')[0]));
      chip.appendChild(mkEl('div','lock-char-chip-blurb',ch.blurb));
      chip.addEventListener('click',()=>{
        const idx=S.lockSelectedChars.indexOf(ch.id);
        if(idx>-1){
          S.lockSelectedChars.splice(idx,1);
        } else {
          if(S.lockSelectedChars.length>=needCount){
            S.lockSelectedChars.shift();
          }
          S.lockSelectedChars.push(ch.id);
        }
        render();
      });
      grid.appendChild(chip);
    });
    card.appendChild(grid);

    const warn = div('lock-warning');
    warn.appendChild(mkEl('div','lock-warning-text','⚠ this choice is permanent — you cannot choose again'));
    card.appendChild(warn);

    const confirmBtn = mkEl('button','lock-confirm-btn'+(S.lockSelectedChars.length===needCount?' active':''),
      S.lockChoice==='A' ? 'Lock in these two stories' : 'Lock in this story');
    confirmBtn.addEventListener('click',()=>{
      if(S.lockSelectedChars.length!==needCount) return;
      S.pendingLockConfirm = true;
      render();
    });
    card.appendChild(confirmBtn);

    const back = mkEl('div','lock-back-link','← choose a different option');
    back.addEventListener('click',()=>{S.lockChoice=null;S.lockSelectedChars=[];render();});
    card.appendChild(back);
  }

  wrap.appendChild(card);
  app.appendChild(wrap);

  if(S.pendingLockConfirm){
    const overlay = div('confirm-overlay');
    const box = div('confirm-box');
    box.appendChild(mkEl('div','confirm-icon','🔒'));
    box.appendChild(mkEl('div','confirm-title','This can\'t be undone'));
    const names = S.lockSelectedChars.map(id=>CHARACTERS.find(c=>c.id===id).name).join(' & ');
    box.appendChild(mkEl('div','confirm-sub',
      S.lockChoice==='A'
        ? `You're locking in 50 free taps each with ${names}. You will not be able to pick different characters for your free trial later.`
        : `You're locking in 100 free taps with ${names}. You will not be able to pick a different character for your free trial later.`
    ));
    const btns = div('confirm-btns');
    const cancel = mkEl('button','confirm-btn-cancel','Wait, let me think');
    cancel.addEventListener('click',()=>{S.pendingLockConfirm=false;render();});
    const go = mkEl('button','confirm-btn-go','I\'m sure');
    go.addEventListener('click',()=>{
      S.unlockedChars = [...S.lockSelectedChars];
      S.tapCap = S.lockChoice==='A' ? 100 : 100; // 50 each = 100 total taps pool; 100 for one char
      S.taps = 0;
      S.pendingLockConfirm = false;
      saveOnboard();
      saveTaps();
      S.screen='home';
      render();
    });
    btns.appendChild(cancel);btns.appendChild(go);
    box.appendChild(btns);
    overlay.appendChild(box);
    app.appendChild(overlay);
  }
}

  }

      card.appendChild(dot);

      lock.textContent='🔒';

  grid.addEventListener('scroll', ()=>{

    const now2 = Date.now();
    if((atBottom || atTop) && now2 - lastBounce > 500){

      void grid.offsetWidth; // force reflow to restart animation

    }

// ── FLOW ENGINE ────────────────────────────────────────────────────────────
function advanceFlow(){
  const flow = S.compiledFlow;
  if(S.currentNodeIdx>=flow.length) return;
  const node = flow[S.currentNodeIdx];
  if(!node) return;

  if(node.ending){
    playMsgs(node.who, node.msgs, ()=>{
      S.screen='ending';
      render();scrollBottom();
    });
    return;
  }
  if(node.choices){
    S.currentChoices = node.choices;
    render();scrollBottom();
    return;
  }
  if(node.who && node.msgs){
    playMsgs(node.who, node.msgs, ()=>{
      S.currentNodeIdx++;
      advanceFlow();
    });
    return;
  }
  S.currentNodeIdx++;
  advanceFlow();
}

function playMsgs(who,msgs,cb){
  S.isAnimating=true;
  render();scrollBottom();
  let i=0;
  function next(){
    if(i>=msgs.length){
      S.isAnimating=false;
      render();scrollBottom();
      if(cb)cb();
      return;
    }
    const msg=msgs[i];
    const delay=i===0?500:Math.min(450+msg.length*14,1300);
    setTimeout(()=>{
      S.displayedMsgs.push({who,text:msg,time:now()});
      i++;
      if(i<msgs.length){render();scrollBottom();next();}
      else next();
    },delay);
  }
  next();
}

// ── PER-DEVICE CODE LOCK ─────────────────────────────────────────────────────
// This is a static file with no backend, so true one-time-use enforcement
// across all devices isn't possible. What this DOES do: once a code is
// redeemed on a given browser/device, that same code is remembered as "used"
// here (localStorage) and will be rejected if entered again on this device —
// e.g. after a "reset free trial" or clearing app state to try to re-claim it.
// It does NOT stop a leaked code from working on a different device/browser.
function getUsedCodes(){
  try{
    return new Set(JSON.parse(localStorage.getItem('sit_used_codes')||'[]'));
  } catch(e){ return new Set(); }
}
function markCodeUsed(code){
  const used = getUsedCodes();
  used.add(code);
  localStorage.setItem('sit_used_codes', JSON.stringify(Array.from(used)));
}

function applyTier(tier, chars){
  S.tier = tier;
  if(tier==='699'){
    S.unlockedChars = Array.from(new Set([...S.unlockedChars, ...chars]));
    S.taps = 0; S.tapCap = 500;
  } else if(tier==='999'){
    S.unlockedChars = chars;
    S.taps = 0; S.tapCap = 1000;
  } else if(tier==='1499'){
    S.unlockedChars = chars;
  }
  saveTier();
  saveTaps();
  localStorage.setItem('sit_tap_cap', S.tapCap||0);
  S.showCodeEntry=false;
  S.codeError='';
  S.tierPicking=null;
  S.screen='home';
  render();
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function div(cls){const d=document.createElement('div');if(cls)d.className=cls;return d;}
function mkEl(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text!==undefined)e.textContent=text;return e;}
function scrollBottom(){const m=document.getElementById('msgs');if(m)setTimeout(()=>m.scrollTop=m.scrollHeight,50);}

// ── IDLE "TAP TO CONTINUE" PROMPT ───────────────────────────────────────────
// If the player hasn't tapped a choice within 5 seconds, a gentle floating
// pill rises from the bottom as a nudge. Tapping it just calls attention back
// to the real choices (it does not itself advance the story) — it dismisses
// itself the moment any choice is tapped.
let idleTimer = null;
function clearIdlePrompt(){
  if(idleTimer){ clearTimeout(idleTimer); idleTimer=null; }
  const el = document.getElementById('idle-prompt');
  if(el) el.remove();
}
function scheduleIdlePrompt(){
  clearIdlePrompt();
  idleTimer = setTimeout(()=>{
    if(!S.currentChoices || S.isAnimating) return;
    if(document.getElementById('idle-prompt')) return;
    const choicesEl = document.querySelector('.choices');
    const h = choicesEl ? choicesEl.getBoundingClientRect().height : 220;
    document.documentElement.style.setProperty('--choices-h', h+'px');
    const prompt = document.createElement('div');
    prompt.id = 'idle-prompt';
    prompt.className = 'idle-prompt';
    prompt.textContent = '✨ tap to continue';
    prompt.addEventListener('click', ()=>{
      const firstBtn = document.querySelector('.choice-btn:not(.filler)') || document.querySelector('.choice-btn');
      if(firstBtn) firstBtn.scrollIntoView({behavior:'smooth', block:'center'});
      clearIdlePrompt();
      scheduleIdlePrompt();
    });
    document.body.appendChild(prompt);
  }, 5000);
}
function now(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

render();
